<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech Store</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>

    body{
      font-family: Arial;
      background:#121212;
      color:white;
      padding:15px;
      margin:0;
    }

    h2{
      margin-bottom:15px;
    }

    .card{
      background:#1e1e1e;
      border-radius:15px;
      padding:15px;
      margin-bottom:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.4);
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#27a7e7;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #444;
      background:#2a2a2a;
      color:white;
      box-sizing:border-box;
      font-size:15px;
    }

    textarea{
      height:100px;
    }

    b{
      color:#4fc3f7;
    }

  </style>
</head>

<body>

<h2>📱 Продаж техніки</h2>

<div class="card">

  <img
  src="https://i.ibb.co/C31xKywd/photo-2026-04-06-15-25-48.jpg"
  style="width:100%; border-radius:12px; margin-bottom:10px;">

  <h3>iPhone</h3>

  <p>Гарний стан</p>

  <b>Ціна</b>

  <br><br>

  <button onclick="order('iPhone')">
    Замовити
  </button>

</div>

<div class="card">
  <h3>MacBook Air M1</h3>
  <p>8/256GB</p>
  <b>24 000 грн</b>

  <br><br>

  <button onclick="order('MacBook Air M1')">
    Замовити
  </button>
</div>

<h2>🛠 Заявка на ремонт</h2>

<input id="name" placeholder="Ваше ім'я">

<input id="phone" placeholder="Телефон">

<input id="device" placeholder="Модель техніки">

<textarea
id="problem"
placeholder="Опишіть проблему"></textarea>

<br><br>

<button onclick="repair()">
  Надіслати заявку
</button>

<script>

const tg = window.Telegram.WebApp;
tg.ready();

const botUsername = "StoreMax003_bot";

function order(product){

  const text =
  encodeURIComponent("Хочу замовити: " + product);

  tg.openTelegramLink(
    "https://t.me/" +
    botUsername +
    "?start=" +
    text
  );

}

function repair(){

  const name =
  document.getElementById("name").value;

  const phone =
  document.getElementById("phone").value;

  const device =
  document.getElementById("device").value;

  const problem =
  document.getElementById("problem").value;

  alert(
    "Заявка створена. Напишіть у бот для підтвердження."
  );

  tg.openTelegramLink(
    "https://t.me/" + botUsername
  );

}

</script>

</body>
</html>
