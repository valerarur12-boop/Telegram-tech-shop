<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Tech Store</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial; padding: 16px; background: #f4f4f4; }
    .card { background: white; padding: 14px; margin-bottom: 12px; border-radius: 12px; }
    button { width: 100%; padding: 12px; border: 0; border-radius: 10px; background: #229ED9; color: white; font-size: 16px; }
    input, textarea { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Продаж техніки</h2>

  <div class="card">
    <h3>iPhone 12</h3>
    <p>128GB, гарний стан</p>
    <b>12 500 грн</b><br><br>
    <button onclick="order('iPhone 12')">Замовити</button>
  </div>

  <div class="card">
    <h3>MacBook Air M1</h3>
    <p>8/256GB</p>
    <b>24 000 грн</b><br><br>
    <button onclick="order('MacBook Air M1')">Замовити</button>
  </div>

  <h2>Заявка на ремонт</h2>

  <input id="name" placeholder="Ваше імʼя">
  <input id="phone" placeholder="Телефон">
  <input id="device" placeholder="Модель техніки">
  <textarea id="problem" placeholder="Опишіть проблему"></textarea>
  <button onclick="repair()">Надіслати заявку</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    function order(product) {
      tg.sendData("Замовлення: " + product);
    }

    function repair() {
      const data = {
        type: "repair",
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        device: document.getElementById("device").value,
        problem: document.getElementById("problem").value
      };

      tg.sendData(JSON.stringify(data));
    }
  </script>
</body>
</html>
